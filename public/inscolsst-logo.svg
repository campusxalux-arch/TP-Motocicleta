<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="100%" height="100%">
  <!-- Symbol / Graphic Mark -->
  <g transform="translate(10, 0)">
    <!-- Outer Crescent - Deep Royal Blue -->
    <path 
      d="M 130 18 C 52 -2 -5 58 2 128 C 8 182 72 205 132 178 C 62 188 18 132 20 75 C 22 35 68 15 130 18 Z" 
      fill="#0038A8" 
    />
    
    <!-- Yellow Hook (Left) -->
    <path 
      d="M 52 82 C 42 98 46 122 68 128 C 88 132 108 112 100 88 C 96 76 82 70 72 70" 
      fill="none" 
      stroke="#FFD100" 
      stroke-width="18" 
      stroke-linecap="round" 
    />
    
    <!-- Cyan Hook (Right - Interlocking) -->
    <path 
      d="M 100 88 C 112 104 108 128 86 132" 
      fill="none" 
      stroke="#00A3E0" 
      stroke-width="18" 
      stroke-linecap="round" 
    />
  </g>

  <!-- Text Block (Dark version for light backgrounds) -->
  <g transform="translate(205, 0)" fill="#000000" font-family="'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif">
    <text x="0" y="50" font-size="38" font-weight="900" letter-spacing="1">INSTITUTO</text>
    <text x="0" y="85" font-size="24" font-weight="600" letter-spacing="1.5">COLOMBIANO DE</text>
    <text x="0" y="117" font-size="24" font-weight="600" letter-spacing="1.5">SEGURIDAD Y</text>
    <text x="0" y="149" font-size="24" font-weight="600" letter-spacing="1.5">SALUD EN EL</text>
    <text x="0" y="181" font-size="24" font-weight="600" letter-spacing="1.5">TRABAJO</text>
  </g>
</svg>
